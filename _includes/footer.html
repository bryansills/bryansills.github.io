    <section class="copyright"><a href="mailto:{{ site.email}}">{{ site.name }}</a> &copy; {{ site.time | date: '%Y' }} &bull; Don't be a jerk</section>
    <section class="poweredby">Made with <a href="http://jekyllrb.com"> Jekyll</a> and <a href="https://github.com/ageitgey/amplify">Amplify</a></section>
  </div>

  <amp-analytics type="googleanalytics" id="analytics1">
    <script type="application/json">
    {

        "account": "UA-73615349-1"

        }
      }
    }
