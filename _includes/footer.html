<footer class="site-footer">
  <p>
    <span>
      {% if site.twitter_username %}
        {% include icon-twitter.html username=site.twitter_username %}
      {% endif %}
    </span>
    <span>
      {% if site.github_username %}
        {% include icon-github.html username=site.github_username %}
      {% endif %}
    </span>
  </p>

  <div class="inner">
    &copy; {{ site.time | date: '%Y' }} &bull; <a class="subscribe" href="{{ "/feed.xml" | prepend: site.baseurl }}">RSS</a> &bull; Made with <a href="http://jekyllrb.com"> Jekyll</a> and <a href="https://github.com/ageitgey/amplify">Amplify</a>
  </div>

  <amp-analytics type="googleanalytics" id="analytics1">
    <script type="application/json">
    {
      "vars": {
        "account": "UA-73615349-1"
      },
      "triggers": {
        "trackPageview": {
          "on": "visible",
          "request": "pageview"
        }
      }
    }
    </script>
  </amp-analytics>
</footer>
